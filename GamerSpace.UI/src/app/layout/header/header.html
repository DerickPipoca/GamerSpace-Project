<header>
  <div class="container header__container">
    <nav class="header__nav">
      <ul class="header__list">
        <li class="header__item">
          <a class="header__logo" routerLink="/home">
            <img src="../../../assets/images/logos/gamer-space-logo.svg" alt="Gamer Space Logo" />
          </a>
        </li>
        <li class="header__item">
          <a class="header__link" routerLink="/home">Home</a>
        </li>
        <li class="header__item">
          <a class="header__link" routerLink="/categories">Categorias</a>
        </li>
        <li class="header__item">
          <a class="header__link" routerLink="/under-construction">Sobre nós</a>
        </li>
        <li class="header__item header__group--input">
          <input
            type="text"
            #box
            (keyup.enter)="searchItem(box.value)"
            placeholder="Pesquisa"
            class="header__input"
          />
          <mat-icon class="header__icon header__icon--search">search </mat-icon>
        </li>
        <li class="header__item header__item--icon">
          <a class="header__link" routerLink="/cart">
            <mat-icon class="header__icon">shopping_cart</mat-icon>
          </a>
        </li>
        <li class="header__item header__item--icon">
          <a class="header__link" routerLink="/login">
            <mat-icon class="header__icon">person</mat-icon>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
