<footer>
  <div class="container footer__container">
    <a class="footer__logo" routerLink="/home">
      <img src="../../../assets/images/logos/gamer-space-logo.svg" alt="Gamer Space Logo" />
    </a>
    <div class="footer__column">
      <h4 class="footer__title">Ajuda</h4>
      <ul class="footer__list">
        <li><a class="footer__link" routerLink="/under-construction">FAQ</a></li>
        <li><a class="footer__link" routerLink="/under-construction">Entrega</a></li>
        <li><a class="footer__link" routerLink="/under-construction">Devolução</a></li>
        <li><a class="footer__link" routerLink="/under-construction">Status do pedido</a></li>
        <li><a class="footer__link" routerLink="/under-construction">Opções de pagamento</a></li>
      </ul>
    </div>

    <div class="footer__divider"></div>

    <div class="footer__column">
      <h4 class="footer__title">Empresa</h4>
      <ul class="footer__list">
        <li><a class="footer__link" routerLink="/under-construction">Sobre nós</a></li>
        <li>
          <a class="footer__link" routerLink="/under-construction">Política de privacidade</a>
        </li>
        <li><a class="footer__link" routerLink="/under-construction">Termos de serviço</a></li>
      </ul>
    </div>

    <div class="footer__divider"></div>

    <div class="footer__column">
      <h4 class="footer__title">Contatos</h4>
      <ul class="footer__list footer__list--contact">
        <li><fa-icon [icon]="['fas', 'envelope']" /><a class="footer__link">Email</a></li>
        <li><fa-icon [icon]="['fab', 'facebook']" /><a class="footer__link">Facebook</a></li>
        <li><fa-icon [icon]="['fab', 'x-twitter']" /><a class="footer__link">X</a></li>
        <li><fa-icon [icon]="['fab', 'instagram']" /><a class="footer__link">Instagram</a></li>
        <li><fa-icon [icon]="['fab', 'linkedin']" /><a class="footer__link">Linkedin</a></li>
      </ul>
    </div>
  </div>
</footer>
