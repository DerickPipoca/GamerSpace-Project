<div class="category-card">
  <a [routerLink]="['/products']" [queryParams]="{ CategoryIds: categoryPathId }">
    <img class="category-card__image" src="{{ categoryImageUrl }}" alt="..." />
    <div class="category-card__content">
      <h3 class="category-card__title">{{ categoryName }}</h3>
      <span class="category-card__more">Saber mais ></span>
    </div>
  </a>
</div>
